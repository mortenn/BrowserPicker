name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  ci:
    permissions:
      contents: read
    uses: mortenn/BrowserPicker.Actions/.github/workflows/ci.yml@26e97f05ef9173c03ba5ae8eec115d2528aa42d2
    with:
      dotnet_version: 10.x
      publish_deliverables: ${{ github.event_name == 'push' }}