name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  ci:
    permissions:
      contents: read
    uses: mortenn/BrowserPicker.Actions/.github/workflows/ci.yml@627f29ef7223135c3c64c5a7503786373cc721bf
    with:
      dotnet_version: 10.x
      publish_deliverables: ${{ github.event_name == 'push' }}
