name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  ci:
    permissions:
      contents: read
    uses: mortenn/BrowserPicker.Actions/.github/workflows/ci.yml@5f95a77eb339ee9cd52ff7c8049b3c48c21cf28e
    with:
      dotnet_version: 10.x
      publish_deliverables: ${{ github.event_name == 'push' }}
