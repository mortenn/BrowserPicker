name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  ci:
    permissions:
      contents: read
    uses: mortenn/BrowserPicker.Actions/.github/workflows/ci.yml@b2803f3abd28e96a397fcd8cab6996797cea5b01
    with:
      dotnet_version: 10.x
      publish_deliverables: ${{ github.event_name == 'push' }}
