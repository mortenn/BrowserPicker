name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  ci:
    permissions:
      contents: read
    uses: mortenn/BrowserPicker.Actions/.github/workflows/ci.yml@fd5cb1c79ec3a6649a3546b5a983dfc7b75386b8
    with:
      dotnet_version: 10.x
      publish_deliverables: ${{ github.event_name == 'push' }}
