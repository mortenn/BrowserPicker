name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  ci:
    permissions:
      contents: read
    uses: mortenn/BrowserPicker.Actions/.github/workflows/ci.yml@f8d4053b126ad3f0b3ee6792c5895acaa3b87f04
    with:
      dotnet_version: 10.x
      publish_deliverables: ${{ github.event_name == 'push' }}
